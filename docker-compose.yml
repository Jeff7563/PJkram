version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8870:80"
    volumes:
      - ./:/var/www/html/
    depends_on:
      - db
    environment:
      - APP_ROLE=frontend
      - PMA_HOST=db

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8871:80"
    volumes:
      - ./:/var/www/html/
    depends_on:
      - db
    environment:
      - APP_ROLE=backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: service_center
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"  
    environment:
      PMA_HOST: db 
    depends_on:
      - db

volumes:
  mysql_data: